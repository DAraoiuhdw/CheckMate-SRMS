<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Manage student grades in S.M.A.R.T — view, add, and export grade records.">
    <title>Grades - S.M.A.R.T</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <button class="mobile-menu-btn"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <div class="sidebar-logo-icon">SM</div>
                    <div class="sidebar-logo-text">S.M.A.R.T</div>
                </div>
            </div>
            <nav>
                <ul class="sidebar-nav">
                    <li class="sidebar-nav-item"><a href="/dashboard.html" class="sidebar-nav-link"><span class="sidebar-nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span> Dashboard</a></li>
                    <li class="sidebar-nav-item" data-role="admin,teacher"><a href="/students.html" class="sidebar-nav-link"><span class="sidebar-nav-icon"><svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span> Students</a></li>
                    <li class="sidebar-nav-item" data-role="admin,teacher"><a href="/attendance.html" class="sidebar-nav-link"><span class="sidebar-nav-icon"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></span> Attendance</a></li>
                    <li class="sidebar-nav-item"><a href="/grades.html" class="sidebar-nav-link active"><span class="sidebar-nav-icon"><svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></span> Grades</a></li>
                    <li class="sidebar-nav-item"><a href="/announcements.html" class="sidebar-nav-link"><span class="sidebar-nav-icon"><svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></span> Announcements</a></li>
                    <li class="sidebar-nav-item" data-role="admin,teacher"><a href="/nfc-attendance.html" class="sidebar-nav-link"><span class="sidebar-nav-icon"><svg viewBox="0 0 24 24"><path d="M6 8.32a7.43 7.43 0 0 1 0 7.36"/><path d="M9.46 6.21a11.76 11.76 0 0 1 0 11.58"/><path d="M12.91 4.1a15.91 15.91 0 0 1 .01 15.8"/><path d="M16.37 2a20.16 20.16 0 0 1 0 20"/></svg></span> NFC Attendance</a></li>
                    <li class="sidebar-nav-item" data-role="admin"><a href="/archive.html" class="sidebar-nav-link"><span class="sidebar-nav-icon"><svg viewBox="0 0 24 24"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg></span> Archive</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <div class="sidebar-user-card">
                    <div class="sidebar-user-status"><div class="status-dot"></div><span style="font-size:12px;color:var(--text-secondary);">Online</span></div>
                    <div class="sidebar-user-name user-name">User</div>
                    <div class="sidebar-user-email user-email">user@example.com</div>
                    <div class="sidebar-user-role user-role">Role</div>
                </div>
                <button class="dark-mode-toggle" style="position:static;margin-bottom:8px;width:100%;"><span class="toggle-icon"></span></button>
                <button id="logoutBtn" class="btn btn-secondary" style="width:100%;">Logout</button>
            </div>
        </aside>
        
        <main class="main-content">
            <header class="header">
                <div>
                    <h1 class="header-title">Grades</h1>
                    <p class="header-subtitle">View and manage student grade records</p>
                </div>
                <div class="header-actions">
                    <button onclick="openModal('add-grade-modal')" class="btn btn-success" data-action-role="teacher">+ Add Grade</button>
                    <button class="btn btn-info" onclick="exportGrades()">Export CSV</button>
                </div>
            </header>
            
            <div class="card">
                <div class="search-bar">
                    <select id="student-filter" class="form-select" style="width:auto;min-width:180px;" onchange="filterGrades()">
                        <option value="">All Students</option>
                    </select>
                    <select id="semester-filter" class="form-select" style="width:auto;" onchange="filterGrades()">
                        <option value="">All Semesters</option>
                        <option value="First">First Semester</option>
                        <option value="Second">Second Semester</option>
                    </select>
                    <button class="btn btn-secondary" onclick="loadGrades()">Refresh</button>
                </div>
            </div>
            
            <div class="table-container">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Student</th>
                            <th>Section</th>
                            <th>Subject</th>
                            <th>Grade</th>
                            <th>Score</th>
                            <th>Semester</th>
                            <th>Year</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="grades-tbody">
                        <tr><td colspan="8" class="text-center"><div class="loading"></div><p style="margin-top:8px;color:var(--text-secondary);">Loading...</p></td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    
    <!-- Add Grade Modal -->
    <div id="add-grade-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Add Grade</h2>
                <button class="modal-close">&times;</button>
            </div>
            <form id="add-grade-form">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                    <div class="form-group" style="grid-column:span 2;">
                        <label class="form-label" for="grade-student">Student *</label>
                        <select id="grade-student" name="student_id" class="form-select" required>
                            <option value="">Select Student</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="grade-subject">Subject *</label>
                        <input type="text" id="grade-subject" name="subject" class="form-input" placeholder="e.g. Mathematics" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="grade-grade">Grade *</label>
                        <select id="grade-grade" name="grade" class="form-select" required>
                            <option value="">Select Grade</option>
                            <option value="A+">A+</option><option value="A">A</option><option value="A-">A-</option>
                            <option value="B+">B+</option><option value="B">B</option><option value="B-">B-</option>
                            <option value="C+">C+</option><option value="C">C</option><option value="C-">C-</option>
                            <option value="D">D</option><option value="F">F</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="grade-score">Score</label>
                        <input type="number" id="grade-score" name="score" class="form-input" placeholder="e.g. 95" step="0.01">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="grade-max-score">Max Score</label>
                        <input type="number" id="grade-max-score" name="max_score" class="form-input" placeholder="e.g. 100" step="0.01">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="grade-semester">Semester</label>
                        <select id="grade-semester" name="semester" class="form-select">
                            <option value="">Select Semester</option>
                            <option value="First">First Semester</option>
                            <option value="Second">Second Semester</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="grade-year">Academic Year</label>
                        <input type="text" id="grade-year" name="academic_year" class="form-input" placeholder="e.g. 2023-2024">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('add-grade-modal')">Cancel</button>
                    <button type="button" class="btn btn-success" onclick="addGrade()">+ Add Grade</button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="/js/script.js"></script>
</body>
</html>

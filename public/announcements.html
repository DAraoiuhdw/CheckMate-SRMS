<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View and manage announcements in S.M.A.R.T.">
    <title>Announcements - S.M.A.R.T</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <button class="mobile-menu-btn"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <div class="sidebar-logo-icon">SM</div>
                    <div class="sidebar-logo-text">S.M.A.R.T</div>
                </div>
            </div>
            <nav>
                <ul class="sidebar-nav">
                    <li class="sidebar-nav-item"><a href="/dashboard.html" class="sidebar-nav-link"><span class="sidebar-nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span> Dashboard</a></li>
                    <li class="sidebar-nav-item" data-role="admin,teacher"><a href="/students.html" class="sidebar-nav-link"><span class="sidebar-nav-icon"><svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span> Students</a></li>
                    <li class="sidebar-nav-item" data-role="admin,teacher"><a href="/attendance.html" class="sidebar-nav-link"><span class="sidebar-nav-icon"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></span> Attendance</a></li>
                    <li class="sidebar-nav-item"><a href="/grades.html" class="sidebar-nav-link"><span class="sidebar-nav-icon"><svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></span> Grades</a></li>
                    <li class="sidebar-nav-item"><a href="/announcements.html" class="sidebar-nav-link active"><span class="sidebar-nav-icon"><svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></span> Announcements</a></li>
                    <li class="sidebar-nav-item" data-role="admin,teacher"><a href="/nfc-attendance.html" class="sidebar-nav-link"><span class="sidebar-nav-icon"><svg viewBox="0 0 24 24"><path d="M6 8.32a7.43 7.43 0 0 1 0 7.36"/><path d="M9.46 6.21a11.76 11.76 0 0 1 0 11.58"/><path d="M12.91 4.1a15.91 15.91 0 0 1 .01 15.8"/><path d="M16.37 2a20.16 20.16 0 0 1 0 20"/></svg></span> NFC Attendance</a></li>
                    <li class="sidebar-nav-item" data-role="admin"><a href="/archive.html" class="sidebar-nav-link"><span class="sidebar-nav-icon"><svg viewBox="0 0 24 24"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg></span> Archive</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <div class="sidebar-user-card">
                    <div class="sidebar-user-status"><div class="status-dot"></div><span style="font-size:12px;color:var(--text-secondary);">Online</span></div>
                    <div class="sidebar-user-name user-name">User</div>
                    <div class="sidebar-user-email user-email">user@example.com</div>
                    <div class="sidebar-user-role user-role">Role</div>
                </div>
                <button class="dark-mode-toggle" style="position:static;margin-bottom:8px;width:100%;"><span class="toggle-icon"></span></button>
                <button id="logoutBtn" class="btn btn-secondary" style="width:100%;">Logout</button>
            </div>
        </aside>
        
        <main class="main-content">
            <header class="header">
                <div>
                    <h1 class="header-title">Announcements</h1>
                    <p class="header-subtitle">View and manage system announcements</p>
                </div>
                <div class="header-actions" data-action-role="admin,teacher">
                    <button onclick="openModal('add-announcement-modal')" class="btn btn-success">+ Create Announcement</button>
                </div>
            </header>
            
            <div class="card">
                <div class="search-bar">
                    <input type="text" class="search-input" placeholder="Search announcements..." onkeyup="searchAnnouncements(this.value)">
                    <button class="btn btn-secondary" onclick="loadAnnouncements()">Refresh</button>
                </div>
            </div>
            
            <div id="announcements-container">
                <div class="text-center" style="padding:32px;"><div class="loading"></div><p style="margin-top:8px;color:var(--text-secondary);">Loading announcements...</p></div>
            </div>
        </main>
    </div>
    
    <!-- Add Announcement Modal -->
    <div id="add-announcement-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Create Announcement</h2>
                <button class="modal-close">&times;</button>
            </div>
            <form id="add-announcement-form">
                <div class="form-group">
                    <label class="form-label" for="announcement-title">Title *</label>
                    <input type="text" id="announcement-title" name="title" class="form-input" placeholder="Announcement title" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="announcement-content">Content *</label>
                    <textarea id="announcement-content" name="content" class="form-textarea" placeholder="Write your announcement..." rows="4" required></textarea>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;">
                    <div class="form-group">
                        <label class="form-label" for="announcement-audience">Audience</label>
                        <select id="announcement-audience" name="target_audience" class="form-select">
                            <option value="all">All</option>
                            <option value="teachers">Teachers</option>
                            <option value="parents">Parents</option>
                            <option value="students">Students</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="announcement-priority">Priority</label>
                        <select id="announcement-priority" name="priority" class="form-select">
                            <option value="normal">Normal</option>
                            <option value="high">High</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="announcement-expires">Expires</label>
                        <input type="date" id="announcement-expires" name="expires_at" class="form-input">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('add-announcement-modal')">Cancel</button>
                    <button type="button" class="btn btn-success" onclick="addAnnouncement()">Create</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Edit Announcement Modal -->
    <div id="edit-announcement-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Edit Announcement</h2>
                <button class="modal-close">&times;</button>
            </div>
            <form id="edit-announcement-form">
                <input type="hidden" id="edit-announcement-id">
                <div class="form-group">
                    <label class="form-label">Title *</label>
                    <input type="text" id="edit-announcement-title" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Content *</label>
                    <textarea id="edit-announcement-content" class="form-textarea" rows="4" required></textarea>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;">
                    <div class="form-group">
                        <label class="form-label">Audience</label>
                        <select id="edit-announcement-audience" class="form-select">
                            <option value="all">All</option>
                            <option value="teachers">Teachers</option>
                            <option value="parents">Parents</option>
                            <option value="students">Students</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Priority</label>
                        <select id="edit-announcement-priority" class="form-select">
                            <option value="normal">Normal</option>
                            <option value="high">High</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Expires</label>
                        <input type="date" id="edit-announcement-expires" class="form-input">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('edit-announcement-modal')">Cancel</button>
                    <button type="button" class="btn btn-success" onclick="updateAnnouncement()">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="/js/script.js"></script>
</body>
</html>

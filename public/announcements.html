<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Manage school announcements and communications in CheckMate! SRMS.">
    <title>Announcements - CheckMate! SRMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="dark-mode">
    <button class="mobile-menu-btn">☰</button>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <div class="sidebar-logo-icon"><img src="/assets/logo.png" alt="Logo" style="width:26px;height:26px;border-radius:8px;"></div>
                    <div class="sidebar-logo-text">CheckMate! SRMS</div>
                </div>
            </div>
            <nav>
                <ul class="sidebar-nav">
                    <li class="sidebar-nav-item"><a href="/dashboard.html" class="sidebar-nav-link"><span class="sidebar-nav-icon">📊</span> Dashboard</a></li>
                    <li class="sidebar-nav-item"><a href="/students.html" class="sidebar-nav-link"><span class="sidebar-nav-icon">👥</span> Students</a></li>
                    <li class="sidebar-nav-item"><a href="/attendance.html" class="sidebar-nav-link"><span class="sidebar-nav-icon">✅</span> Attendance</a></li>
                    <li class="sidebar-nav-item"><a href="/grades.html" class="sidebar-nav-link"><span class="sidebar-nav-icon">📚</span> Grades</a></li>
                    <li class="sidebar-nav-item"><a href="/announcements.html" class="sidebar-nav-link active"><span class="sidebar-nav-icon">📢</span> Announcements</a></li>
                    <li class="sidebar-nav-item"><a href="/nfc-attendance.html" class="sidebar-nav-link"><span class="sidebar-nav-icon">📱</span> NFC Attendance</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <button class="dark-mode-toggle" style="position:static;margin-bottom:10px;width:100%;"><span class="toggle-icon">☀️</span></button>
                <button id="logoutBtn" class="btn btn-secondary" style="width:100%;">Logout</button>
            </div>
        </aside>
        
        <main class="main-content">
            <header class="header">
                <div>
                    <h1 class="header-title">Announcements</h1>
                    <p class="header-subtitle">Manage school announcements and communications</p>
                </div>
                <div class="header-actions">
                    <button onclick="openModal('add-announcement-modal')" class="btn btn-success">📢 New Announcement</button>
                </div>
            </header>
            
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-icon">📢</div><div class="stat-value" id="total-announcements">0</div><div class="stat-label">Total</div></div>
                <div class="stat-card"><div class="stat-icon">🔥</div><div class="stat-value" id="high-priority">0</div><div class="stat-label">High Priority</div></div>
                <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-value" id="target-all">0</div><div class="stat-label">For All</div></div>
                <div class="stat-card"><div class="stat-icon">📅</div><div class="stat-value" id="active-today">0</div><div class="stat-label">Active Today</div></div>
            </div>
            
            <div class="card">
                <div class="search-bar">
                    <input type="text" id="announcement-search" class="search-input" placeholder="🔍 Search announcements..." onkeyup="searchAnnouncements(this.value)">
                    <button class="btn btn-secondary" onclick="loadAnnouncements()">🔄 Refresh</button>
                </div>
                <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
                    <select id="priority-filter" class="form-select" style="width:auto;" onchange="filterAnnouncements()">
                        <option value="">All Priorities</option>
                        <option value="high">High</option>
                        <option value="normal">Normal</option>
                        <option value="low">Low</option>
                    </select>
                    <select id="audience-filter" class="form-select" style="width:auto;" onchange="filterAnnouncements()">
                        <option value="">All Audiences</option>
                        <option value="all">All Users</option>
                        <option value="teachers">Teachers</option>
                        <option value="students">Students</option>
                        <option value="parents">Parents</option>
                    </select>
                </div>
            </div>
            
            <div id="announcements-container">
                <div class="text-center" style="padding:30px;"><div class="loading"></div><p style="margin-top:10px;color:var(--text-secondary);">Loading...</p></div>
            </div>
        </main>
    </div>
    
    <!-- Add Announcement Modal -->
    <div id="add-announcement-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Create Announcement</h2>
                <button class="modal-close">&times;</button>
            </div>
            <form id="add-announcement-form">
                <div class="form-group">
                    <label class="form-label">Title *</label>
                    <input type="text" id="announcement-title" name="title" class="form-input" placeholder="Announcement title" maxlength="255" required>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:15px;">
                    <div class="form-group">
                        <label class="form-label">Audience</label>
                        <select name="target_audience" class="form-select">
                            <option value="all">All Users</option>
                            <option value="teachers">Teachers</option>
                            <option value="students">Students</option>
                            <option value="parents">Parents</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Priority</label>
                        <select name="priority" class="form-select">
                            <option value="normal">Normal</option>
                            <option value="high">High</option>
                            <option value="low">Low</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Expires On</label>
                        <input type="date" name="expires_at" class="form-input">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Content *</label>
                    <textarea name="content" class="form-textarea" placeholder="Announcement content..." rows="6" required></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('add-announcement-modal')">Cancel</button>
                    <button type="button" class="btn btn-success" onclick="addAnnouncement()">📢 Publish</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Edit Announcement Modal -->
    <div id="edit-announcement-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Edit Announcement</h2>
                <button class="modal-close">&times;</button>
            </div>
            <form id="edit-announcement-form">
                <input type="hidden" id="edit-announcement-id">
                <div class="form-group">
                    <label class="form-label">Title *</label>
                    <input type="text" id="edit-announcement-title" class="form-input" maxlength="255" required>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:15px;">
                    <div class="form-group">
                        <label class="form-label">Audience</label>
                        <select id="edit-announcement-audience" class="form-select">
                            <option value="all">All Users</option>
                            <option value="teachers">Teachers</option>
                            <option value="students">Students</option>
                            <option value="parents">Parents</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Priority</label>
                        <select id="edit-announcement-priority" class="form-select">
                            <option value="normal">Normal</option>
                            <option value="high">High</option>
                            <option value="low">Low</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Expires On</label>
                        <input type="date" id="edit-announcement-expires" class="form-input">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Content *</label>
                    <textarea id="edit-announcement-content" class="form-textarea" rows="6" required></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('edit-announcement-modal')">Cancel</button>
                    <button type="button" class="btn btn-success" onclick="updateAnnouncement()">💾 Update</button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="/js/script.js"></script>
    <script>
        let allAnnouncementsData = [];

        async function loadAnnouncements() {
            try {
                const response = await fetch('/api/announcements');
                const data = await response.json();
                if (data.success) {
                    allAnnouncementsData = data.data;
                    displayAnnouncements(data.data);
                    updateAnnouncementStats(data.data);
                }
            } catch (error) {
                showNotification('Network error', 'error');
            }
        }

        function updateAnnouncementStats(announcements) {
            updateStatCard('total-announcements', announcements.length);
            updateStatCard('high-priority', announcements.filter(a => a.priority === 'high').length);
            updateStatCard('target-all', announcements.filter(a => a.target_audience === 'all').length);
            const today = new Date().toDateString();
            updateStatCard('active-today', announcements.filter(a => new Date(a.created_at).toDateString() === today).length);
        }

        function filterAnnouncements() {
            const priority = document.getElementById('priority-filter').value;
            const audience = document.getElementById('audience-filter').value;
            let filtered = allAnnouncementsData;
            if (priority) filtered = filtered.filter(a => a.priority === priority);
            if (audience) filtered = filtered.filter(a => a.target_audience === audience || a.target_audience === 'all');
            displayAnnouncements(filtered);
            updateAnnouncementStats(filtered);
        }
    </script>
</body>
</html>

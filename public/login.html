<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to S.M.A.R.T — Student Management And Record Tracking system.">
    <title>Login - S.M.A.R.T</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="wallpaper-bg"></div>
    <div class="wallpaper-overlay"></div>
    
    <div class="login-container">
        <div class="login-card fade-in">
            <button class="dark-mode-toggle" id="login-theme-toggle">
                <span class="toggle-icon"></span>
            </button>
            
            <div class="logo-container">
                <div class="logo">SM</div>
                <h1 class="app-title">S.M.A.R.T</h1>
                <p class="app-subtitle">Student Management And Record Tracking</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="Enter your email" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Enter your password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary">Sign In</button>
            </form>
            
            <div style="margin-top:24px;padding-top:16px;border-top:1px solid var(--border-color);">
                <p style="color:var(--text-secondary);font-size:13px;margin-bottom:8px;font-weight:600;">Demo Accounts:</p>
                <div style="display:grid;gap:6px;font-size:12px;color:var(--text-secondary);">
                    <div style="padding:8px 10px;background:var(--bg-base);border-radius:8px;border:1px solid var(--border-color);">
                        <strong style="color:var(--danger);">Admin:</strong> admin@smart-srms.com / admin123
                    </div>
                    <div style="padding:8px 10px;background:var(--bg-base);border-radius:8px;border:1px solid var(--border-color);">
                        <strong style="color:var(--primary);">Teacher:</strong> teacher@smart-srms.com / teacher123
                    </div>
                    <div style="padding:8px 10px;background:var(--bg-base);border-radius:8px;border:1px solid var(--border-color);">
                        <strong style="color:var(--success);">Student:</strong> john.smith@email.com / student123
                    </div>
                </div>
            </div>
            
            <div style="margin-top:14px;padding-top:10px;border-top:1px solid var(--border-color);">
                <p style="color:var(--text-muted);font-size:11px;text-align:center;">
                    S.M.A.R.T &mdash; &copy; 2024 All Rights Reserved<br>
                    <a href="tel:09688742671" style="color:var(--text-muted);text-decoration:none;">09688742671</a> &middot;
                    <a href="mailto:deuscherhansbusiness@gmail.com" style="color:var(--text-muted);text-decoration:none;">deuscherhansbusiness@gmail.com</a>
                </p>
            </div>
        </div>
    </div>
    
    <script src="/js/script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Manage student records in CheckMate! SRMS - Add, edit, view, and export student information.">
    <title>Students - CheckMate! SRMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="dark-mode">
    <button class="mobile-menu-btn">☰</button>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <div class="sidebar-logo-icon"><img src="/assets/logo.png" alt="Logo" style="width:26px;height:26px;border-radius:8px;"></div>
                    <div class="sidebar-logo-text">CheckMate! SRMS</div>
                </div>
            </div>
            <nav>
                <ul class="sidebar-nav">
                    <li class="sidebar-nav-item"><a href="/dashboard.html" class="sidebar-nav-link"><span class="sidebar-nav-icon">📊</span> Dashboard</a></li>
                    <li class="sidebar-nav-item"><a href="/students.html" class="sidebar-nav-link active"><span class="sidebar-nav-icon">👥</span> Students</a></li>
                    <li class="sidebar-nav-item"><a href="/attendance.html" class="sidebar-nav-link"><span class="sidebar-nav-icon">✅</span> Attendance</a></li>
                    <li class="sidebar-nav-item"><a href="/grades.html" class="sidebar-nav-link"><span class="sidebar-nav-icon">📚</span> Grades</a></li>
                    <li class="sidebar-nav-item"><a href="/announcements.html" class="sidebar-nav-link"><span class="sidebar-nav-icon">📢</span> Announcements</a></li>
                    <li class="sidebar-nav-item"><a href="/nfc-attendance.html" class="sidebar-nav-link"><span class="sidebar-nav-icon">📱</span> NFC Attendance</a></li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <button class="dark-mode-toggle" style="position:static;margin-bottom:10px;width:100%;"><span class="toggle-icon">☀️</span></button>
                <button id="logoutBtn" class="btn btn-secondary" style="width:100%;">Logout</button>
            </div>
        </aside>
        
        <main class="main-content">
            <header class="header">
                <div>
                    <h1 class="header-title">Students</h1>
                    <p class="header-subtitle">Manage student records and information</p>
                </div>
                <div class="header-actions">
                    <button onclick="openModal('add-student-modal')" class="btn btn-success">➕ Add Student</button>
                </div>
            </header>
            
            <div class="card">
                <div class="search-bar">
                    <input type="text" id="student-search" class="search-input" placeholder="🔍 Search students by name or email..." onkeyup="searchStudents(this.value)">
                    <button class="btn btn-secondary" onclick="loadStudents()">🔄 Refresh</button>
                </div>
                <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
                    <select id="section-filter" class="form-select section-select" style="width:auto;">
                        <option value="">All Sections</option>
                    </select>
                    <button class="btn btn-info" onclick="exportStudents()">📥 Export CSV</button>
                </div>
            </div>
            
            <div class="table-container">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Student Name</th>
                            <th>Section</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Gender</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="students-tbody">
                        <tr><td colspan="6" class="text-center"><div class="loading"></div><p style="margin-top:10px;color:var(--text-secondary);">Loading...</p></td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    
    <!-- Add Student Modal -->
    <div id="add-student-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Add New Student</h2>
                <button class="modal-close">&times;</button>
            </div>
            <form id="add-student-form">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;">
                    <div class="form-group">
                        <label class="form-label" for="student-name">Student Name *</label>
                        <input type="text" id="student-name" name="student_name" class="form-input" placeholder="Enter student name" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="student-email">Email</label>
                        <input type="email" id="student-email" name="email" class="form-input" placeholder="Enter email">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="student-phone">Phone</label>
                        <input type="tel" id="student-phone" name="phone" class="form-input" placeholder="Enter phone">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="student-gender">Gender</label>
                        <select id="student-gender" name="gender" class="form-select">
                            <option value="">Select Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="student-section">Section</label>
                        <select id="student-section" name="section_id" class="form-select section-select">
                            <option value="">Select Section</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="student-dob">Date of Birth</label>
                        <input type="date" id="student-dob" name="date_of_birth" class="form-input">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="student-address">Address</label>
                    <textarea id="student-address" name="address" class="form-textarea" placeholder="Enter address" rows="3"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('add-student-modal')">Cancel</button>
                    <button type="button" class="btn btn-success" onclick="addStudent()">➕ Add Student</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Edit Student Modal -->
    <div id="edit-student-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Edit Student</h2>
                <button class="modal-close">&times;</button>
            </div>
            <form id="edit-student-form">
                <input type="hidden" id="edit-student-id" name="id">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;">
                    <div class="form-group">
                        <label class="form-label">Student Name *</label>
                        <input type="text" id="edit-student-name" name="student_name" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" id="edit-student-email" name="email" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Phone</label>
                        <input type="tel" id="edit-student-phone" name="phone" class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Gender</label>
                        <select id="edit-student-gender" name="gender" class="form-select">
                            <option value="">Select Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Section</label>
                        <select id="edit-student-section" name="section_id" class="form-select section-select">
                            <option value="">Select Section</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Date of Birth</label>
                        <input type="date" id="edit-student-dob" name="date_of_birth" class="form-input">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Address</label>
                    <textarea id="edit-student-address" name="address" class="form-textarea" rows="3"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('edit-student-modal')">Cancel</button>
                    <button type="button" class="btn btn-success" onclick="updateStudent()">💾 Save Changes</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- View Student Modal -->
    <div id="view-student-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Student Details</h2>
                <button class="modal-close">&times;</button>
            </div>
            <div id="student-details"></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('view-student-modal')">Close</button>
            </div>
        </div>
    </div>
    
    <script src="/js/script.js"></script>
    <script>
        async function viewStudent(id) {
            try {
                const response = await fetch('/api/students');
                const data = await response.json();
                if (data.success) {
                    const student = data.data.find(s => s.id === id);
                    if (student) {
                        const c = document.getElementById('student-details');
                        c.innerHTML = `
                            <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;">
                                <div><label class="form-label">Name</label><div style="padding:10px;background:var(--bg-base);border-radius:10px;border:1px solid var(--border-color);color:var(--text-primary);">${escapeHtml(student.student_name)}</div></div>
                                <div><label class="form-label">Section</label><div style="padding:10px;background:var(--bg-base);border-radius:10px;border:1px solid var(--border-color);color:var(--text-primary);">${escapeHtml(student.section_name||'N/A')}</div></div>
                                <div><label class="form-label">Email</label><div style="padding:10px;background:var(--bg-base);border-radius:10px;border:1px solid var(--border-color);color:var(--text-primary);">${escapeHtml(student.email||'N/A')}</div></div>
                                <div><label class="form-label">Phone</label><div style="padding:10px;background:var(--bg-base);border-radius:10px;border:1px solid var(--border-color);color:var(--text-primary);">${escapeHtml(student.phone||'N/A')}</div></div>
                                <div><label class="form-label">Gender</label><div style="padding:10px;background:var(--bg-base);border-radius:10px;border:1px solid var(--border-color);color:var(--text-primary);">${escapeHtml(student.gender||'N/A')}</div></div>
                                <div><label class="form-label">Date of Birth</label><div style="padding:10px;background:var(--bg-base);border-radius:10px;border:1px solid var(--border-color);color:var(--text-primary);">${student.date_of_birth?formatDate(student.date_of_birth):'N/A'}</div></div>
                            </div>
                            <div style="margin-top:15px;"><label class="form-label">Address</label><div style="padding:10px;background:var(--bg-base);border-radius:10px;border:1px solid var(--border-color);color:var(--text-primary);">${escapeHtml(student.address||'N/A')}</div></div>
                            ${student.nfc_tag_id ? `<div style="margin-top:15px;"><label class="form-label">NFC Tag ID</label><div style="padding:10px;background:var(--bg-base);border-radius:10px;border:1px solid var(--border-color);color:var(--primary-green);">🏷️ ${escapeHtml(student.nfc_tag_id)}</div></div>` : ''}
                        `;
                        openModal('view-student-modal');
                    }
                }
            } catch (error) {
                showNotification('Failed to load student details', 'error');
            }
        }
        
        function deleteStudent(id) {
            if (confirm('Are you sure you want to delete this student?')) {
                fetch(`/api/students/${id}`, { method: 'DELETE' })
                .then(r => r.json())
                .then(data => {
                    if (data.success) { showNotification('Student deleted', 'success'); loadStudents(); }
                    else showNotification(data.message || 'Failed', 'error');
                })
                .catch(() => showNotification('Network error', 'error'));
            }
        }
    </script>
</body>
</html>
